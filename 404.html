<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Seite nicht gefunden — Ulli Zelle</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600;700&family=DM+Sans:ital,wght@0,400;0,500;0,600;1,300&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/nav.css">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <style>
    .error-page {
      min-height: 80vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 4rem 2rem;
    }
    .error-code {
      font-family: 'Unbounded', sans-serif;
      font-size: clamp(4rem, 12vw, 8rem);
      font-weight: 700;
      color: var(--border);
      line-height: 1;
      margin-bottom: 1rem;
    }
    .error-title {
      font-family: 'Unbounded', sans-serif;
      font-size: 1.4rem;
      font-weight: 600;
      margin-bottom: 1rem;
    }
    .error-desc {
      color: var(--text2);
      max-width: 400px;
      margin-bottom: 2rem;
    }
    .error-link {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: var(--ink);
      color: var(--bg);
      text-decoration: none;
      padding: 0.85rem 1.7rem;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
    .error-link:hover { background: var(--accent); }
  </style>
</head>
<body>
  <nav id="nav" aria-label="Hauptnavigation">
    <a href="./" class="nav-logo" aria-label="Ulli Zelle - Startseite">
      <img src="images/shared/uz_logo_transparent.svg" alt="UZ Logo" width="34" height="34">
      <div class="nav-logo-text">
        <span class="nav-logo-name">Ulli Zelle</span>
        <span class="nav-logo-sub">Interior Design & Workplace Consulting</span>
      </div>
    </a>
  </nav>
  <main class="error-page">
    <div class="error-code">404</div>
    <h1 class="error-title">Seite nicht gefunden</h1>
    <p class="error-desc">Diese Seite existiert nicht oder wurde verschoben. Schau dir stattdessen meine Projekte an.</p>
    <a href="projekte/" class="error-link">Zu den Projekten &rarr;</a>
  </main>
  <script defer src="js/nav.js"></script>
</body>
</html>
